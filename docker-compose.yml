version: "3.9"

services:
  backend:
    build: ./backend
    container_name: placementor-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: placementor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
